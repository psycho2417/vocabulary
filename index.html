<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每日英文單字練習</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-image: url('pikmin.jpg');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h1 { font-size: 32px; color: #2c3e50; margin: 10px 0; cursor: pointer; }
        .pos { font-style: italic; color: #7f8c8d; margin-bottom: 10px; }
        .meaning { font-size: 20px; color: #27ae60; font-weight: bold; margin: 20px 0; min-height: 50px; }
        button { background-color: #3498db; color: white; border: none; padding: 15px; font-size: 16px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-list { background-color: #9b59b6; }
        select { width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 16px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="card">
    <div style="color: #95a5a6; font-size: 14px; margin-bottom: 10px;">每日單字學習系統</div>
    
    <select id="day-selector" onchange="loadDay(this.value)">
        <option value="">選擇已開放的日期</option>
    </select>

    <h1 id="word" onclick="speak()">點擊開始</h1>
    <div id="pos" class="pos">-</div>
    <div id="meaning" class="meaning">請從上方選擇日期開始</div>

    <button onclick="nextWord()">下一個單字</button>
    <button class="btn-list" onclick="openFullList()">開啟單字總覽分頁</button>
</div>

<script>
    // 請將 600 個單字補齊至此處
    const fullWordList = [
        { word: "implement", pos: "v.", meaning: "實施" }, { word: "subordinate", pos: "n.", meaning: "下屬" }, 
        { word: "innovative", pos: "adj.", meaning: "創新的" }, { word: "strategy", pos: "n.", meaning: "策略" }, 
        { word: "negotiate", pos: "v.", meaning: "談判" }, { word: "reimburse", pos: "v.", meaning: "核銷" }, 
        { word: "lucrative", pos: "adj.", meaning: "賺錢的" }, { word: "agenda", pos: "n.", meaning: "議程" }, 
        { word: "compromise", pos: "v.", meaning: "妥協" }, { word: "diligent", pos: "adj.", meaning: "勤奮的" }
    ];

    let currentDayWords = [];
    let idx = 0;
    let currentAudio = null;
    const startOfCount = new Date(2024, 0, 1);
    const selector = document.getElementById('day-selector');
    
    for (let i = 1; i <= 60; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = `第 ${i} 天進度`;
        selector.appendChild(opt);
    }

    function loadDay(day) {
        if(!day) return;
        const now = new Date();
        const daysPassed = Math.floor((now - startOfCount) / (1000 * 60 * 60 * 24)) + 1;

        if (parseInt(day) > daysPassed) {
            alert("還沒到那天喔！請專注於當前的學習。");
            document.getElementById("day-selector").value = "";
            return;
        }

        const start = (day - 1) * 10;
        currentDayWords = fullWordList.slice(start, start + 10);
        idx = 0;
        updateUI();
    }

    function saveToHistory(wordObj) {
        let history = JSON.parse(localStorage.getItem('my_word_history')) || [];
        if (!history.some(item => item.word === wordObj.word)) {
            history.push(wordObj);
            localStorage.setItem('my_word_history', JSON.stringify(history));
        }
    }

    function updateUI() {
        if(currentDayWords.length === 0) return;
        const w = currentDayWords[idx];
        document.getElementById("word").innerText = w.word;
        document.getElementById("pos").innerText = w.pos;
        document.getElementById("meaning").innerText = w.meaning;
        saveToHistory(w);
        speak();
    }

    function nextWord() {
        if(currentDayWords.length === 0) return alert("請先從上方選擇日期");
        idx = (idx + 1) % currentDayWords.length;
        updateUI();
    }

    function speak() {
        const text = document.getElementById("word").innerText;
        if (text === "點擊開始" || text === "請從上方選擇日期開始") return;
        if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
        
        const googleTTSUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=${encodeURIComponent(text)}`;
        currentAudio = new Audio(googleTTSUrl);
        currentAudio.play();
    }

    function openFullList() {
        const history = JSON.parse(localStorage.getItem('my_word_history')) || [];
        const newWindow = window.open("", "_blank");
        let html = `
        <html><head><title>單字總覽</title>
        <style>body{font-family:sans-serif; padding:20px;} .item{padding:12px; border-bottom:1px solid #eee; cursor:pointer;} .item:hover{background:#f0f7ff;}</style>
        </head><body><h1>已學單字總覽 (點擊發音)</h1>`;
        
        history.forEach((w, i) => {
            html += `<div class='item' onclick="speak('${w.word}')"><strong>${i+1}. ${w.word}</strong> (${w.pos}) - ${w.meaning}</div>`;
        });
        
        html += `<script>
            function speak(text) {
                const url = 'https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=' + encodeURIComponent(text);
                new Audio(url).play();
            }
        <\/script></body></html>`;
        
        newWindow.document.write(html);
    }
</script>
</body>
</html>
