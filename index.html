<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>阿穎的英文學習日記</title>
    <script src="words.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: url('pikmin.jpg') center/cover fixed; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1 { font-size: 32px; color: #2c3e50; font-weight: bold; cursor: pointer; margin: 10px 0; }
        .meaning { font-size: 20px; color: #27ae60; margin: 20px 0; min-height: 30px; }
        button { background: #3498db; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; margin-bottom: 15px; }
        #search-box { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #history-list { margin-top: 20px; text-align: left; max-height: 250px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1 id="word" onclick="speak()">阿穎的英文學習日記</h1>
    <div id="meaning" class="meaning">-</div>
    <button onclick="getRandomWord()">隨機抽取單字</button>
    
    <input type="text" id="search-box" placeholder="搜尋已學單字..." onkeyup="renderHistory()">
    <div id="history-list"><strong>已學清單:</strong></div>
</div>

<script>
    // 確保 words.js 裡的變數名稱為 words，這裡我們進行對應
    // 如果 words.js 裡用的是 wordDb，請將下方改為 wordDb
    const currentDb = typeof words !== 'undefined' ? words : wordDb; 
    let learnedWords = [];

    function speak() {
        const text = document.getElementById("word").innerText;
        if (text === "點擊抽單字") return;
        window.speechSynthesis.cancel();
        let u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        window.speechSynthesis.speak(u);
    }

    function getRandomWord() {
        if (learnedWords.length >= currentDb.length) return alert("全部學完啦！");
        
        let randomWord;
        do {
            randomWord = currentDb[Math.floor(Math.random() * currentDb.length)];
        } while (learnedWords.includes(randomWord));

        learnedWords.push(randomWord);
        document.getElementById("word").innerText = randomWord.word;
        document.getElementById("meaning").innerText = randomWord.meaning;
        
        speak();
        renderHistory();
    }

    // 在 script 區塊的最上方加入一個變數來追蹤是否在搜尋中
    let isSearching = false;

    function renderHistory() {
        const query = document.getElementById('search-box').value.toLowerCase();
        const listDiv = document.getElementById('history-list');
        
        // 如果搜尋欄是空的，關閉搜尋模式並恢復正常顯示
        if (!query) {
            isSearching = false;
            updateListDisplay();
            return;
        }

        // 開始搜尋模式
        isSearching = true;
        listDiv.innerHTML = "<strong>搜尋結果 (點擊加入學習):</strong>";
        
        currentDb.forEach(w => {
            if(w.word.toLowerCase().includes(query) || w.meaning.includes(query)) {
                const item = document.createElement('div');
                item.style.cursor = 'pointer';
                item.style.padding = '5px 0';
                item.style.borderBottom = '1px solid #eee';
                item.style.color = learnedWords.includes(w) ? '#27ae60' : '#34495e';
                item.innerHTML = `${w.word} - ${w.meaning} ${learnedWords.includes(w) ? ' (已學)' : ''}`;
                
                item.onclick = function() {
                    if (!learnedWords.includes(w)) {
                        learnedWords.push(w);
                    }
                    document.getElementById("word").innerText = w.word;
                    document.getElementById("meaning").innerText = w.meaning;
                    speak();
                    
                    // 【關鍵優化】點擊後不強迫清空搜尋欄，保持當前搜尋狀態
                    // 我們只更新列表，不跳回已學清單，除非使用者主動刪除關鍵字
                };
                listDiv.appendChild(item);
            }
        });
    }

    function updateListDisplay() {
        const listDiv = document.getElementById('history-list');
        listDiv.innerHTML = "<strong>已學清單:</strong>";
        [...learnedWords].reverse().forEach(w => {
            const item = document.createElement('div');
            item.style.cursor = 'pointer';
            item.style.padding = '5px 0';
            item.style.borderBottom = '1px solid #eee';
            item.innerHTML = `<strong>${w.word}</strong> - ${w.meaning}`;
            item.onclick = () => {
                document.getElementById("word").innerText = w.word;
                document.getElementById("meaning").innerText = w.meaning;
                speak();
            };
            listDiv.appendChild(item);
        });
    }
</script>
</body>
</html>
